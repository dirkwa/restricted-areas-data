name: check-upstream

# Monthly cross-check: has Navigator published a newer dataset than we serve?
# The weekly sync.yml normally picks changes up via the API; this independent
# probe scrapes the data-request page's advertised dataset date and compares it
# to the datasetDate in our latest published manifest, catching the case where
# the API lags or the sync is broken. Opens (or updates) a single tracking
# issue when upstream is newer. It NEVER downloads the terms-gated dataset.
on:
  schedule:
    - cron: '17 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Compare upstream dataset date with published manifest
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Capture first so a non-zero exit fails the step instead of being
          # swallowed by the redirect into a half-written GITHUB_OUTPUT.
          out="$(node bin/check-upstream.mjs)"
          printf '%s\n' "$out" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.compare.outputs.newer == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_DATE: ${{ steps.compare.outputs.upstream_date }}
          PUBLISHED_DATE: ${{ steps.compare.outputs.published_date }}
        run: |
          title="New Navigator dataset available ($UPSTREAM_DATE)"
          body=$(cat <<EOF
          Navigator advertises dataset date **$UPSTREAM_DATE**; the latest published manifest is **$PUBLISHED_DATE**.

          The weekly \`sync.yml\` should have picked this up via the API — if this issue appears, the sync is lagging or broken. Check recent sync runs first. Manual fallback: read the runbook in README.md, click I-AGREE at https://navigatormap.org/data-request, upload the raw zip to a staging release, then dispatch \`seed-mirror.yml\` (re-seed) and \`build.yml\`.

          This issue is updated by the monthly \`check-upstream\` workflow; it does not download anything.
          EOF
          )
          existing=$(gh issue list --label upstream-update --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label upstream-update
          fi

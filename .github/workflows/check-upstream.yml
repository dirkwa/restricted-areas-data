name: check-upstream

# Monthly cross-check: has Navigator published a newer dataset than we serve?
# The weekly sync.yml normally picks changes up via the API; this independent
# probe reads the data-access page for the dataset date Navigator stamps into
# the ArcGIS FeatureServer layer name (e.g. Navigator_AllSites_MMDDYY_...) and
# compares it to the datasetDate in our latest published manifest, catching the
# case where the API lags or the sync is broken. Opens (or updates) a single
# tracking issue when upstream is newer. Download-free (HTML/metadata only);
# a transient upstream failure degrades to "nothing new", never a red run.
on:
  schedule:
    - cron: '17 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Compare upstream dataset date with published manifest
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Capture first so a non-zero exit fails the step instead of being
          # swallowed by the redirect into a half-written GITHUB_OUTPUT.
          out="$(node bin/check-upstream.mjs)"
          printf '%s\n' "$out" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.compare.outputs.newer == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_DATE: ${{ steps.compare.outputs.upstream_date }}
          PUBLISHED_DATE: ${{ steps.compare.outputs.published_date }}
        run: |
          title="New Navigator dataset available ($UPSTREAM_DATE)"
          body=$(cat <<EOF
          Navigator advertises dataset date **$UPSTREAM_DATE**; the latest published manifest is **$PUBLISHED_DATE**.

          The weekly \`sync.yml\` should have picked this up via the API — if this issue appears, the sync is lagging or broken. Check recent sync runs first, and force a full reconcile by dispatching \`sync.yml\` with \`full=true\`. Only re-seed from a fresh bulk export (the bootstrap runbook in README.md) if the API mirror is unrecoverable — the gated I-AGREE download flow no longer exists (Navigator V2 routes data requests through https://navigatormap.org/data-request → Contact Us).

          This issue is updated by the monthly \`check-upstream\` workflow; it does not download anything.
          EOF
          )
          existing=$(gh issue list --label upstream-update --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label upstream-update
          fi

name: sync

# Weekly automated dataset refresh, following the upstream-recommended
# synchronization pattern (Navigator API docs, conventions/data-synchronization):
# pull the incremental changed_since window, patch the mirror, refresh only
# changed sites, then rebuild + publish the regional extracts when anything moved.
# A quiet incremental week costs ~1 API request and publishes nothing. The sync
# auto-runs a full catalog census ~monthly (and on a stale/absent baseline) to
# self-heal drift; force one with the `full` input below.
on:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Sweep + diff only; never rewrites or publishes'
        type: boolean
        default: false
      full:
        description: 'Force a full catalog census this run (recovery / reconcile)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: data-publish
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      dataset_date: ${{ steps.sync.outputs.dataset_date }}
      version_tag: ${{ steps.sync.outputs.version_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync mirror against the Navigator API
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          out="$(node bin/sync-mirror.mjs \
            --dry-run "${{ inputs.dry_run || 'false' }}" \
            --full "${{ inputs.full || 'false' }}")"
          printf '%s\n' "$out"
          printf '%s\n' "$out" >> "$GITHUB_OUTPUT"

      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create sync-failure --description "Automated dataset sync failed" --color D93F0B 2>/dev/null || true
          title="Automated dataset sync failed"
          body="The weekly mirror sync failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          The published data keeps serving the last good release; no action reaches users until this is fixed. Check the run log — common causes are an API anomaly tripping a sanity guard (incremental removal cap, or the census half-empty/mass-removal guard) or a missing/garbled draft mirror release (re-seed via seed-mirror.yml). To force a full reconcile (recommended after any outage), dispatch this workflow with full=true."
          existing=$(gh issue list --label sync-failure --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label sync-failure
          fi

  publish:
    needs: sync
    if: needs.sync.outputs.changed == 'true' && !inputs.dry_run
    uses: ./.github/workflows/build.yml
    permissions:
      contents: write
    with:
      source: mirror
      dataset_date: ${{ needs.sync.outputs.dataset_date }}
      version_tag: ${{ needs.sync.outputs.version_tag }}
      publish: true

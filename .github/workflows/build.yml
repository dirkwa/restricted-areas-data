name: build

# Build the published per-region FlatGeobuf extracts from one of two sources:
#   - staging-zip: a staged bulk Navigator download (terms-of-use gated; a
#     human obtained a bulk export and uploaded the zip to a staging release)
#   - mirror: the draft mirror release that sync.yml keeps current via the
#     public Navigator API (the fully automated path)
# Manually dispatchable, and callable as a reusable workflow by sync.yml.
# It never downloads from navigatormap.org.
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Input dataset: the staged raw zip, or the API-synced mirror'
        type: choice
        options: [staging-zip, mirror]
        default: staging-zip
      raw_release_tag:
        description: 'staging-zip only: staging release tag holding navigator-raw.zip'
        required: false
      dataset_date:
        description: 'Navigator dataset date (ISO; staging-zip only — mirror builds read it from mirror-state.json)'
        required: false
      download_date:
        description: 'staging-zip only: date the maintainer received the bulk export (ISO)'
        required: false
      version_tag:
        description: 'Release tag to publish (e.g. v2026.05)'
        required: true
      publish:
        description: 'Create a PUBLIC GitHub release. Leave false to only build artifacts.'
        type: boolean
        default: false
  workflow_call:
    inputs:
      source:
        type: string
        default: mirror
      dataset_date:
        type: string
        required: false
      version_tag:
        type: string
        required: true
      publish:
        type: boolean
        default: false

permissions:
  contents: write

env:
  RAW_ZIP: navigator-raw.zip

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      regions: ${{ steps.regions.outputs.list }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify (lint + test)
        run: npm run build:all

      - name: Download staged raw zip
        if: ${{ inputs.source != 'mirror' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ inputs.raw_release_tag }}" --pattern "$RAW_ZIP" --output "$RAW_ZIP" --clobber

      - name: Normalize + region-tag (staging zip)
        if: ${{ inputs.source != 'mirror' }}
        run: |
          mkdir -p work/regions
          # Stream each member out of the zip and normalize it without ever
          # holding the 6.7 GB expansion on disk at once. normalize.mjs writes
          # exploded single-component NDJSON; region-tag routes by centroid.
          for member in $(unzip -Z1 "$RAW_ZIP" | grep -E '\.json$'); do
            partition="$(basename "$member" .json)"
            unzip -p "$RAW_ZIP" "$member" \
              | node bin/normalize.mjs \
                  --partition "$partition" \
                  --out-full work/"$partition".full.ndjson \
                  --out-display work/"$partition".display.ndjson \
                  --exclusions work/"$partition".exclusions.json
          done
          # Provenance for make-manifest, same shape the mirror path provides.
          jq -n --arg d "${{ inputs.dataset_date }}" --arg dl "${{ inputs.download_date }}" \
            --arg from "${{ inputs.raw_release_tag }}" \
            '{datasetDate: $d, downloadDate: $dl, generatedFrom: $from}' > work/provenance.json

      - name: Normalize + region-tag (mirror)
        if: ${{ inputs.source == 'mirror' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p work/mirror work/regions
          gh release download mirror --dir work/mirror --clobber \
            --pattern '*.ndjson.gz' --pattern 'mirror-state.json'
          # Same streaming pipeline; the mirror packages one feature per line.
          for shard in work/mirror/*.ndjson.gz; do
            partition="$(basename "$shard" .ndjson.gz)"
            gunzip -c "$shard" \
              | node bin/normalize.mjs \
                  --format ndjson \
                  --partition "$partition" \
                  --out-full work/"$partition".full.ndjson \
                  --out-display work/"$partition".display.ndjson \
                  --exclusions work/"$partition".exclusions.json
          done
          jq --arg d "${{ inputs.dataset_date }}" \
            '{datasetDate: (if $d == "" then .datasetDate else $d end), downloadDate: .downloadDate, generatedFrom: ("mirror, seeded from " + .seededFrom + ", last sweep " + (.lastSweepDate // "never"))}' \
            work/mirror/mirror-state.json > work/provenance.json

      - name: Region-tag + merge exclusions
        run: |
          cat work/*.full.ndjson | node bin/region-tag.mjs --outdir work/regions --suffix full
          cat work/*.display.ndjson | node bin/region-tag.mjs --outdir work/regions --suffix display
          node bin/merge-exclusions.mjs work/*.exclusions.json > work/exclusions.json

      - name: Determine regions produced
        id: regions
        run: |
          list="$(ls work/regions/*.full.ndjson | xargs -n1 basename | sed 's/\.full\.ndjson$//' | jq -R . | jq -cs .)"
          echo "list=$list" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ndjson
          path: |
            work/regions/*.ndjson
            work/exclusions.json
            work/provenance.json
          retention-days: 1

  build-region:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.prepare.outputs.regions) }}
    container:
      # Pinned for reproducible builds; bump deliberately.
      image: ghcr.io/osgeo/gdal:ubuntu-small-3.9.3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ndjson
          path: work

      - name: Install Node.js + production deps (not present in the GDAL image)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends nodejs npm
          node --version
          # region-meta.mjs imports @turf/bbox; dev deps (eslint/vitest) are
          # not needed in the conversion matrix.
          npm ci --omit=dev

      - name: NDJSON -> FlatGeobuf (full + display)
        env:
          REGION: ${{ matrix.region }}
        run: |
          mkdir -p dist
          full="work/regions/$REGION.full.ndjson"
          display="work/regions/$REGION.display.ndjson"
          # ogr2ogr reads NDJSON via GeoJSONSeq. The non-scalar fields were already
          # JSON-encoded by normalize (FGB has no list/struct column type) and the
          # display geometry was coordinate-rounded upstream.
          ogr2ogr -f FlatGeobuf "dist/$REGION.fgb" "GeoJSONSeq:$full"
          ogr2ogr -f FlatGeobuf "dist/$REGION.display.fgb" "GeoJSONSeq:$display"
          # bbox + featureCount sidecar that build-index folds into the manifest.
          node bin/region-meta.mjs --region "$REGION" --input "$full" > "dist/$REGION.meta.json"

      - name: Sub-split guard (>1.9 GB)
        env:
          REGION: ${{ matrix.region }}
        run: |
          # GitHub release assets cap at 2 GB. A region this large means the
          # exclusions did not bite; fail loud rather than publish a truncated
          # asset. Sub-splitting by sub-bbox would be the follow-up.
          for f in dist/$REGION.fgb dist/$REGION.display.fgb; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt 2040109465 ]; then
              echo "::error::$f is $size bytes (>1.9 GB); sub-split required"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fgb-${{ matrix.region }}
          path: |
            dist/*.fgb
            dist/*.meta.json
          retention-days: 1

  publish:
    needs: [prepare, build-region]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: fgb-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ndjson
          path: work

      - name: Build manifest + data licence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Provenance (dataset/download dates, source description) was decided
          # by the prepare job — identical handling for both sources.
          dataset_date="$(jq -r .datasetDate work/provenance.json)"
          download_date="$(jq -r .downloadDate work/provenance.json)"
          generated_from="$(jq -r .generatedFrom work/provenance.json)"
          # Compose the make-manifest index: per-region asset list with the
          # bbox/featureCount read back from each FGB via ogrinfo.
          node bin/build-index.mjs \
            --dist dist \
            --exclusions work/exclusions.json \
            --generated-from "$generated_from" \
            > dist/index.json
          node bin/make-manifest.mjs \
            --index dist/index.json \
            --version "${{ inputs.version_tag }}" \
            --dataset-date "$dataset_date" \
            --download-date "$download_date" \
            --generated-from "$generated_from" \
            > dist/manifest.json
          cp LICENSE-DATA.md dist/LICENSE-DATA.md

      # Always keep the built output as a (non-public) workflow artifact so a
      # build-only run is inspectable without publishing anything.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle
          path: |
            dist/*.fgb
            dist/manifest.json
            dist/LICENSE-DATA.md
          retention-days: 7

      - name: Publish release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Recreate the release if the tag was already published (manual re-run / recovery).
          if gh release view "${{ inputs.version_tag }}" >/dev/null 2>&1; then
            gh release delete "${{ inputs.version_tag }}" --yes --cleanup-tag
          fi
          dataset_date="$(jq -r .datasetDate work/provenance.json)"
          gh release create "${{ inputs.version_tag }}" \
            --title "${{ inputs.version_tag }}" \
            --notes "ProtectedSeas Navigator regional FlatGeobuf extracts. Dataset $dataset_date. CC BY 4.0 — see LICENSE-DATA.md." \
            dist/*.fgb dist/manifest.json dist/LICENSE-DATA.md

      - name: Prune old data releases (keep newest 3)
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ inputs.version_tag }}
          KEEP: '3'
        run: |
          # Each data release is ~2.7 GB and boats only read releases/latest;
          # keep a small rollback cushion instead of accumulating forever.
          # Only published releases whose tag matches the data scheme are
          # candidates — the draft mirror release and anything else are never
          # touched. The just-published tag is guarded explicitly.
          # --paginate emits one array per page; --slurp wraps them in an
          # outer array, and .[][] flattens so keep-N applies globally.
          gh api "repos/${{ github.repository }}/releases" --paginate --slurp \
            | jq -r --argjson keep "$KEEP" '
                [ .[][]
                  | select(.draft | not)
                  | select(.tag_name | test("^v[0-9]{4}\\.[0-9]{2}(\\.[0-9]{2})?$")) ]
                | sort_by(.created_at) | reverse | .[$keep:] | .[].tag_name' \
            | while read -r tag; do
                if [ -n "$tag" ] && [ "$tag" != "$CURRENT_TAG" ]; then
                  echo "pruning $tag"
                  gh release delete "$tag" --yes --cleanup-tag
                fi
              done
